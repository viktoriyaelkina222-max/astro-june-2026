<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Астроподсказки Виктории Елькиной</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #EBF3F9 0%, #F7FBFF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1F2D3D;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 30px;
      padding: 38px 28px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(90, 120, 150, 0.18);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #EBF3F9;
      color: #52667A;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .emoji {
      font-size: 44px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.4px;
    }

    p {
      margin: 0 0 26px;
      font-size: 16px;
      line-height: 1.5;
      color: #52667A;
    }

    .button {
      display: block;
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      background: #1F2D3D;
      color: #ffffff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(31, 45, 61, 0.25);
    }

    .small {
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.4;
      color: #7A8FA3;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">июнь 2026</div>
    <div class="emoji">🌙</div>
    <h1>Астроподсказки Виктории Елькиной</h1>
    <p>30 дней — 30 астроподсказок: Луна, аспекты, эмоциональный фон и человеческие рекомендации без эзотерического сиропа.</p>

    <a class="button" href="webcal://raw.githubusercontent.com/viktoriyaelkina222-max/astro-june-2026/main/astro-calendar.ics">
      Добавить календарь в iPhone
    </a>

    <div class="small">
      Если iPhone спросит разрешение — нажми «Подписаться».
    </div>
  </main>
</body>
</html>
